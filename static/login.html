<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AuraNemotron</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 26, 35, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --accent-color: #f35588;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(243, 85, 136, 0.05) 0%, transparent 40%);
        }
        .login-card {
            width: min(380px, 92vw);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 0.25rem;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; }
        input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(11, 12, 16, 0.6);
            color: var(--text-color);
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: var(--primary-color); }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #06121a;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        .error {
            color: var(--accent-color);
            font-size: 0.82rem;
            min-height: 1.2em;
            margin-bottom: 0.75rem;
        }
        .note { margin-top: 1.25rem; font-size: 0.72rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>AuraNemotron</h1>
        <div class="sub">Multilingual physiotherapy communication aid — authorised users only.</div>
        <form id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required>
            <div class="error" id="login-error"></div>
            <button type="submit" id="login-btn">Sign In</button>
        </form>
        <div class="note">This tool is a communication aid only and does not provide clinical advice.</div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            btn.disabled = true;
            err.textContent = '';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                if (res.ok) {
                    location.href = '/';
                    return;
                }
                err.textContent = await res.text() || 'Login failed.';
            } catch (ex) {
                err.textContent = 'Network error.';
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
